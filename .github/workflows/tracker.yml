name: jtracker
on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      test_notification:
        description: Send a test notification only
        required: false
        type: boolean
        default: false
permissions:
  contents: write
  issues: write
concurrency:
  group: hourly-tracker
  cancel-in-progress: false
jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.test_notification }}" = "true" ]; then python tracker.py --test-notification; else python tracker.py; fi
      - name: Save deduplication state
        if: ${{ inputs.test_notification != true }}
        run: |
          if git diff --quiet -- data/seen.json; then exit 0; fi
          git config user.name "jtracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/seen.json
          git commit -m "Update seen jobs"
          git push
